name: Deploy to GitHub Pages (pygbag)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag==0.9.3

      - name: Build WASM bundle
        env:
          PYTHONUTF8: "1"
        run: |
          pygbag --build \
            --disable-sound-format-error \
            --title "Acceleration of Tofu" \
            --template static/template.tmpl \
            --icon favicon.png \
            main.py

      - name: List build output
        run: ls -la build/web/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
